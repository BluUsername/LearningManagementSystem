<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b1fa2"/>
      <stop offset="100%" style="stop-color:#4a148c"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <g transform="translate(32,30)" fill="white">
    <!-- Cap top -->
    <polygon points="0,-14 22,-4 0,4 -22,-4" opacity="0.95"/>
    <!-- Tassel line -->
    <line x1="22" y1="-4" x2="22" y2="8" stroke="white" stroke-width="2"/>
    <circle cx="22" cy="10" r="2.5"/>
    <!-- Cap band -->
    <path d="M-14,0 L-14,10 Q0,18 14,10 L14,0" fill="none" stroke="white" stroke-width="2.5" opacity="0.85"/>
  </g>
</svg>
